<html lang="es">
<head>

    <title>Porcentaje Asistencia</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- INCLUIR LIBRERIA CHART.JS -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script> <!-- INCLUIR EL PLUGIN PARA ETIQUETAS DE DATOS -->
	<style>
	body {
		font-family: 'Times New Roman', Times, serif;
		margin: 30px;
		background: linear-gradient(to right, #c5cae9, #81d4fa);

	}
	#tit_id {
		text-align: center;
		font-family: Times New Roman;
	}
	</style>
</head>
<body>


	<div class="container mt-5">
		<div id="tit_id">
			<div class="d-flex align-items-center justify-content-center mb-4 gap-2" style="margin-right:900px">
				<a href="principal.html" class="btn btn-outline-dark"><i class="fas fa-arrow-left"></i></a>
			</div>
			<h1>LANDUNI S.A.</h1>
			<h1>ASAMBLEA DE INVERSIONISTAS</h1>
			<h1>30 de abril del 2025</h1>
		</div>
		<b><h3 style="margin-top:50px; font-family:Times New Roman">PORCENTAJE DE ASISTENCIA</h3>
		<div class="progress" style="height: 70px;">
			<div id="barra_asistencia" class="progress-bar progress-bar-striped bg-success" role="progressbar" style="width: 0%; font-size:50px;">0%</div>
		</div>
	</div>

	<script>
	// FUNCION PARA OBTENER EL PORCENTAJE DE ASISTENCIA
	function obtenerPorcentaje() {
		$.ajax({
			url: 'php/calcular_porcentaje_asistencia.php',  
			method: 'GET',  
			success: function(response) {
				console.log(response); // VERIFICAR LA RESPUESTA DEBE SER UN OBJETO NO UN STRING


				if (response.porcentaje_total !== undefined) {
					var porcentaje = response.porcentaje_total;  

					// ACTUALIZA LA BARRA DE PROGRESO
					var barra = document.getElementById("barra_asistencia");
					barra.style.width = porcentaje + "%";  // CAMBIA EL ANCHI DE LA BARRA
					barra.innerHTML = porcentaje + "%";  // MUESTRA EL PORCENTAJE EN LA BARRA
				}
			},
			error: function(xhr, status, error) {
				console.log("Hubo un error al obtener el porcentaje: " + error);
			}
		});
	}

	// LLAMA A LA FUNCION PARA OBTENER EL PORCENTAJE AL ENTRAR EN LA PAGINA
	obtenerPorcentaje();

	// ESTO ES PARA DECIR EN QUE TIEMPO SE DESEA ACTUALIZAR EL PROCENTAJE (POR EJEMPLO 5 SEGUNDOS = 5000)
	setInterval(obtenerPorcentaje, 5000);
	</script>
</body>
</html>
